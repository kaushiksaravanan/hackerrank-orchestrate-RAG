<text x="540.0" y="421.5" font-size="16" text-anchor="middle" fill="#0c5793" font-weight="bold">Agent pipeline   (process_ticket)</text>
<text x="540.0" y="438.5" font-size="13" text-anchor="middle" fill="#0c5793" font-weight="normal">1.  Fast-path classifier</text>
<text x="540.0" y="455.5" font-size="13" text-anchor="middle" fill="#0c5793" font-weight="normal">      gratitude, outage, off-topic, unsafe</text>
<text x="540.0" y="472.5" font-size="13" text-anchor="middle" fill="#0c5793" font-weight="normal">2.  Domain router  ->  HackerRank / Claude / Visa</text>
<text x="540.0" y="489.5" font-size="13" text-anchor="middle" fill="#0c5793" font-weight="normal">3.  Hybrid retrieval</text>
<text x="540.0" y="506.5" font-size="13" text-anchor="middle" fill="#0c5793" font-weight="normal">      BM25 + vector  ->  RRF  +  source priors</text>
<text x="540.0" y="523.5" font-size="13" text-anchor="middle" fill="#0c5793" font-weight="normal">4.  Answerability gate  (top score >= 0.015)</text>
<text x="540.0" y="540.5" font-size="13" text-anchor="middle" fill="#0c5793" font-weight="normal">5.  LLM generation  (JSON, temp=0, retry x 3)</text>
<text x="540.0" y="557.5" font-size="13" text-anchor="middle" fill="#0c5793" font-weight="normal">6.  Grounding verifier</text>
<text x="540.0" y="574.5" font-size="13" text-anchor="middle" fill="#0c5793" font-weight="normal">      strip ungrounded URLs / phones / emails</text>
